# Alembic config for Placement Preparation Tracker.
# The actual engine + target metadata are wired up in alembic/env.py (async).
# We keep this file minimal — most settings live in env.py so they can read
# from app.core.config.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# No sqlalchemy.url here — env.py pulls DATABASE_URL from app settings so the
# same DSN is used by the app and by migrations (no drift).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
